<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Music Book Generator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Music Book Generator</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/catalog" class="{% block nav_catalog %}{% endblock %}">Catalogue</a></li>
                <li><a href="/book-builder" class="{% block nav_builder %}{% endblock %}">Book Builder</a></li>
                <li><a href="/import" class="{% block nav_import %}{% endblock %}">Import</a></li>
                <li><a href="/settings" class="{% block nav_settings %}{% endblock %}">Paramètres</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Music Book Generator</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
